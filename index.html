
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMAMI SOUDA | BUYER / DIRECTOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; background-color: #000; color: #fff; font-family: 'Noto Serif JP', serif; }
        
        /* 最初の画面 */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: sticky;
            top: 0;
        }
        .name { font-size: 3rem; letter-spacing: 0.5em; margin-bottom: 20px; font-weight: 300; }
        .title { font-size: 0.9rem; letter-spacing: 0.8em; color: #ccc; }

        /* スクロールした後のコンテンツエリア */
        .content {
            position: relative;
            background-color: #000;
            padding: 150px 20px;
            text-align: center;
            z-index: 10;
        }
        .text-block {
            max-width: 700px;
            margin: 0 auto 100px;
            line-height: 2.5;
            font-size: 1.1rem;
            letter-spacing: 0.1em;
        }
        .highlight { color: #e5e4e2; font-weight: 600; margin-bottom: 30px; display: block; }
    </style>
</head>
<body>

    <div class="hero">
        <div class="name">AMAMI SOUDA</div>
        <div class="title">BUYER / DIRECTOR</div>
    </div>

    <div class="content">
        <div class="text-block">
            <span class="highlight">価値を磨き、光を当てる。</span>
            23年のキャリアで培った、リテールの真髄。<br>
            テレビショッピング、Eコマース、そしてリアル店舗。<br>
            常に販売の最前線で、モノと人の幸福な出会いを作ってきました。
        </div>

        <div class="text-block">
            <span class="highlight">「本物」だけが持つ、言葉なき説得力。</span>
            素材のルーツから、職人のこだわりまで。<br>
            ストーリーを汲み取り、独自の視点で編集する。<br>
            それが、私の考える「バイヤー」の仕事です。
        </div>
    </div>

</body>
</html>
