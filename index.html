<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMAMI SOUDA - Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'plum-pink': '#DDA0DD',
            'deep-gray': '#2F2F2F',
            'silver': '#C0C0C0',
            'platinum': '#E5E4E2',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&display=swap');
    * { font-family: 'Shippori Mincho', serif !important; }
    body { background-color: white; color: #2F2F2F; -webkit-font-smoothing: antialiased; }
    .fade-in-element { opacity: 0; transform: translateY(20px); transition: opacity 1.2s ease-out, transform 1.2s ease-out; }
    .fade-in-element.visible { opacity: 1; transform: translateY(0); }
    .nav-glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); }
    @keyframes heroZoom { 0%, 100% { transform: scale(1.0); opacity: 0.4; } 50% { transform: scale(1.08); opacity: 0.5; } }
    .animate-hero-zoom { animation: heroZoom 20s ease-in-out infinite; }
  </style>
</head>
<body>

  <nav class="fixed top-0 left-0 w-full z-[100] nav-glass border-b border-black/5 py-5">
    <div class="max-w-7xl mx-auto px-8 flex justify-between items-center">
      <div class="text-base tracking-[0.5em] font-bold uppercase text-deep-gray">AMAMI SOUDA</div>
      <div class="flex gap-10 text-[11px] tracking-[0.2em] uppercase font-medium text-deep-gray/70">
        <a href="#about" class="hover:text-plum-pink transition-colors">About</a>
        <a href="#philosophy" class="hover:text-plum-pink transition-colors">Philosophy</a>
        <a href="#contact" class="hover:text-plum-pink transition-colors">Contact</a>
      </div>
    </div>
  </nav>

  <section class="relative h-screen flex items-center justify-center overflow-hidden bg-[#0a0a0a]">
    <div class="absolute inset-0 z-0">
      <img src="https://images.unsplash.com/photo-1519750783826-e2420f4d687f?q=80&w=2070" class="w-full h-full object-cover grayscale animate-hero-zoom opacity-30">
    </div>
    <div class="relative z-10 text-center">
      <h1 class="fade-in-element text-4xl md:text-5xl font-extralight tracking-[0.8em] text-white/90 uppercase">AMAMI SOUDA</h1>
      <p class="fade-in-element mt-8 text-[12px] tracking-[1.2em] text-plum-pink font-light uppercase" style="transition-delay: 0.5s">Buyer / Director</p>
    </div>
  </section>

  <section id="about" class="py-40 px-8 max-w-4xl mx-auto">
    <div class="fade-in-element flex flex-col md:flex-row gap-16 items-start">
      <div class="w-40 h-40 shrink-0 overflow-hidden rounded-full grayscale border-2 border-black/5">
        <img src="https://assets.st-note.com/production/uploads/images/93491946/profile_49bf2f58f9251f86c590210963a6b45f.jpeg" class="w-full h-full object-cover">
      </div>
      <div>
        <span class="text-sm tracking-[0.4em] text-plum-pink font-medium block mb-6">早田天美 / TEN</span>
        <p class="text-lg leading-[2.4] tracking-wider font-light text-deep-gray/90">
          23年間、ジュエリーから高級皮革まで複数ジャンルを渡り歩いてきました。未知の商材の本質を最速で見極め、言語化し、構造化する。この「再現性のある分析メソッド」こそが、私の最大の武器です。
        </p>
      </div>
    </div>
  </section>

  <section id="contact" class="py-40 bg-zinc-50 px-8 text-center">
    <div class="fade-in-element max-w-2xl mx-auto">
      <h2 class="text-sm tracking-[0.5em] text-plum-pink uppercase mb-12">Contact</h2>
      <p class="text-2xl font-light tracking-widest mb-8">暗香 - ANKOU</p>
      <a href="https://amamisouda.site/diary/" class="inline-block border-b border-deep-gray pb-2 text-sm tracking-widest hover:text-plum-pink hover:border-plum-pink transition-all">Visit Blog</a>
    </div>
  </section>

  <script>
    // フェードインを動かすための命令（これがないと真っ黒になります）
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.fade-in-element').forEach(el => observer.observe(el));
    lucide.createIcons();
  </script>
</body>
</html>
