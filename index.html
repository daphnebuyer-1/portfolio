<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMAMI SOUDA | Buyer / Director</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300;400;500&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "plum-pink": "#d4a5a5",
            platinum: "#e5e4e2",
            "deep-gray": "#4a4a4a"
          },
          fontFamily: {
            serif: ['"Noto Serif JP"', "serif"]
          }
        }
      }
    };
  </script>

  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      overflow-x: hidden;
      font-family: "Noto Serif JP", serif;
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
    }

    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s ease-out;
    }

    .reveal.active {
      opacity: 1;
      transform: translateY(0);
    }

    .dot-bg {
      background-image: radial-gradient(#ffffff05 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .selection-plum::selection {
      background-color: #d4a5a5;
      color: black;
    }

    .nav-light .nav-brand,
    .nav-light .nav-link {
      color: white;
      mix-blend-mode: difference;
    }

    .nav-solid .nav-brand,
    .nav-solid .nav-link {
      color: #4a4a4a;
      mix-blend-mode: normal;
    }
  </style>
</head>

<body class="bg-white text-deep-gray font-serif selection-plum">

<nav id="nav" class="nav-light fixed top-0 left-0 w-full z-50 flex justify-between items-center px-8 py-6 transition-all duration-500">
  <div class="nav-brand text-sm tracking-[0.4em] font-light uppercase">AMAMI SOUDA</div>
  <div class="flex gap-8 text-[10px] tracking-[0.3em] uppercase font-light">
    <a href="#about" class="nav-link hover:text-plum-pink">About</a>
    <a href="#philosophy" class="nav-link hover:text-plum-pink">Philosophy</a>
    <a href="#partnership" class="nav-link hover:text-plum-pink">Partnership</a>
    <a href="#contact" class="nav-link hover:text-plum-pink">Contact</a>
  </div>
</nav>

<section class="relative h-screen flex items-center justify-center bg-black">
  <img src="https://images.unsplash.com/photo-1516589174184-c685266e48fc?q=80&w=2070&auto=format&fit=crop"
       class="absolute w-full h-full object-cover opacity-40" />
  <div class="relative z-10 text-center reveal">
    <h1 class="text-3xl tracking-[0.8em] text-white">AMAMI SOUDA</h1>
    <p class="mt-6 text-xs tracking-[1.5em] text-plum-pink">Buyer / Director</p>
  </div>
</section>

<section id="about" class="py-32 px-8 max-w-4xl mx-auto">
  <div class="reveal">
    <span class="text-plum-pink">早田天美</span>
    <p class="mt-6 text-xl leading-loose">
      2002年からジュエリー、伝統工芸、高級皮革などに向き合い続けた23年。
      それは単なるキャリアではなく、技術そのものです。
    </p>
  </div>
</section>

<section id="philosophy" class="py-32 bg-black text-white dot-bg px-8">
  <div class="max-w-5xl mx-auto grid md:grid-cols-3 gap-12">
    <div class="reveal">
      <h3>見抜く</h3>
      <p>本質を見抜く力</p>
    </div>
    <div class="reveal">
      <h3>整える</h3>
      <p>価値を再構築する</p>
    </div>
    <div class="reveal">
      <h3>届ける</h3>
      <p>価値を伝える</p>
    </div>
  </div>
</section>

<footer id="contact" class="py-32 text-center">
  <h2>お問い合わせ</h2>
</footer>

<script>
document.addEventListener("DOMContentLoaded", function () {

  if (window.lucide) {
    lucide.createIcons();
  }

  const nav = document.getElementById("nav");
  const reveals = document.querySelectorAll(".reveal");

  function handleScroll() {
    if (window.scrollY > 50) {
      nav.classList.add("nav-solid", "bg-white", "py-4");
      nav.classList.remove("nav-light", "py-6");
    } else {
      nav.classList.add("nav-light", "py-6");
      nav.classList.remove("nav-solid", "bg-white", "py-4");
    }

    reveals.forEach(el => {
      if (el.getBoundingClientRect().top < window.innerHeight - 50) {
        el.classList.add("active");
      }
    });
  }

  window.addEventListener("scroll", handleScroll);
  handleScroll();
});
</script>

</body>
</html>
