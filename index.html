<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Essence - Portfolio of a Senior Buyer</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;500&display=swap" rel="stylesheet">
    <style>
        /* AI Studioのデザインを再現したスタイル */
        :root { --bg: #0a0a0a; --text: #f0f0f0; --accent: #d4af37; }
        body, html { 
            margin: 0; padding: 0; background-color: var(--bg); color: var(--text);
            font-family: 'Noto Serif JP', serif; overflow-x: hidden;
        }
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
        }
        .name-main { font-size: 3.5rem; letter-spacing: 0.4em; margin-bottom: 1rem; font-weight: 200; opacity: 0; transform: translateY(20px); animation: fadeInUp 1.5s forwards; }
        .sub-title { font-size: 0.8rem; letter-spacing: 0.6em; color: var(--accent); opacity: 0; animation: fadeIn 2s 1s forwards; }
        
        .section { padding: 150px 10%; max-width: 900px; margin: 0 auto; line-height: 2.2; }
        .vision-text { font-size: 1.25rem; letter-spacing: 0.1em; margin-bottom: 4rem; text-align: justify; }
        .experience-tag { border-left: 1px solid var(--accent); padding-left: 20px; margin-bottom: 3rem; font-size: 0.9rem; color: #888; }

        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { to { opacity: 1; } }

        /* スクロールに応じたふわっとした表示 */
        .reveal { opacity: 0; transform: translateY(30px); transition: all 1.5s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div class="hero">
        <div class="name-main">AMAMI SOUDA</div>
        <div class="sub-title">SENIOR BUYER & DIRECTOR</div>
    </div>

    <div class="section">
        <div class="experience-tag">23 YEARS OF EXPERIENCE IN RETAIL STRATEGY</div>
        
        <div class="reveal vision-text">
            価値を磨き、光を当てる。<br>
            テレビショッピング、Eコマース、そして実店舗。<br>
            2002年から常に販売の最前線に立ち、モノが持つ真実の物語を編集してきました。
        </div>

        <div class="reveal vision-text" style="color: #aaa;">
            単なる仕入れではない。その素材が、その職人が、なぜ特別なのか。<br>
            静かな熱量を言語化し、お客様の元へ届ける。<br>
            それが私の貫いてきたリテールの本質です。
        </div>

        <div class="reveal" style="margin-top: 100px; text-align: center; color: var(--accent); font-size: 0.8rem; letter-spacing: 0.3em;">
            EST. 2002 - SAITAMA / MISATO
        </div>
    </div>

    <script>
        // スクロールで文字を出す仕組み
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
