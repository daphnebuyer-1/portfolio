<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMAMI SOUDA | Buyer / Director</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: "Noto Serif JP", serif;
      background: #fff;
      color: #4a4a4a;
      line-height: 1.8;
    }

    .container {
      width: min(1000px, 90%);
      margin: auto;
    }

    nav {
      position: fixed;
      width: 100%;
      top: 0;
      padding: 20px 0;
      transition: 0.3s;
    }

    nav.scrolled {
      background: rgba(255,255,255,0.95);
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      letter-spacing: 0.3em;
      font-size: 14px;
      color: white;
    }

    nav.scrolled .brand {
      color: #4a4a4a;
    }

    .links a {
      margin-left: 20px;
      font-size: 12px;
      color: white;
      text-decoration: none;
    }

    nav.scrolled .links a {
      color: #4a4a4a;
    }

    .hero {
      height: 100vh;
      background: url('https://images.unsplash.com/photo-1516589174184-c685266e48fc?q=80&w=2070&auto=format&fit=crop') center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
    }

    .hero h1 {
      letter-spacing: 0.4em;
      font-weight: 300;
    }

    section {
      padding: 100px 0;
    }

    .philosophy {
      background: black;
      color: white;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 30px;
    }

    .footer {
      text-align: center;
      padding: 80px 0;
    }

    @media(max-width:768px){
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<nav id="nav">
  <div class="container nav-inner">
    <div class="brand">AMAMI SOUDA</div>
    <div class="links">
      <a href="#about">About</a>
      <a href="#philosophy">Philosophy</a>
      <a href="#contact">Contact</a>
    </div>
  </div>
</nav>

<section class="hero">
  <div>
    <h1>AMAMI SOUDA</h1>
    <p>Buyer / Director</p>
  </div>
</section>

<section id="about">
  <div class="container">
    <p>2002年から様々な商材に向き合い、積み上げてきた経験は単なるキャリアではなく技術そのものです。</p>
  </div>
</section>

<section id="philosophy" class="philosophy">
  <div class="container grid">
    <div>
      <h3>見抜く。</h3>
      <p>本質を見抜く力。</p>
    </div>
    <div>
      <h3>整える。</h3>
      <p>価値を再構築する。</p>
    </div>
    <div>
      <h3>届ける。</h3>
      <p>価値を伝える。</p>
    </div>
  </div>
</section>

<footer id="contact" class="footer">
  <div class="container">
    <p>静かな対話から、新しい価値を始めましょう。</p>
    <p>Email / Note / Instagram</p>
  </div>
</footer>

<script>
window.addEventListener("scroll", function(){
  document.getElementById("nav").classList.toggle("scrolled", window.scrollY > 50);
});
</script>

</body>
</html>
